syntax = "proto3";

package featureregistry.v1;

option go_package = "peoplesuite/platform-contracts/gen/go/featureregistry/v1;featureregistryv1";

import "google/protobuf/struct.proto";

// Micro-app (e.g. Work Hub, Talent Hub, Admin Hub).
message MicroApp {
  string key = 1;
  string name = 2;
  string entry_url = 3;
  string icon_name = 4;
  string kind = 5;
  int32 sort_order = 6;
}

message GetMicroAppsRequest {}

message GetMicroAppsResponse {
  repeated MicroApp apps = 1;
}

// Feature badge (e.g. "new", "soon").
message FeatureBadge {
  string key = 1;
  string label = 2;
  string level = 3;
}

// Feature definition metadata.
message FeatureDefinition {
  string key = 1;
  string title = 2;
  string icon_name = 3;
  string icon_url = 4;
  string entry_url = 5;
  string entry_path = 6;
  string kind = 7;
  repeated FeatureBadge badges = 8;
  string micro_app_key = 9;
  int32 sort_order = 10;
}

message GetFeatureDefinitionsRequest {
  string micro_app_key = 1;  // optional; when set, filter by micro-app
}

message GetFeatureDefinitionsResponse {
  repeated FeatureDefinition features = 1;
}

message GetFeaturesForTenantRequest {
  string tenant_id = 1;
}

message GetFeaturesForTenantResponse {
  repeated FeatureDefinition features = 1;
}

// Feature flag: enabled bool + optional value (string, number, or struct).
message GetFeatureFlagRequest {
  string tenant_id = 1;
  string flag_key = 2;
}

message GetFeatureFlagResponse {
  bool enabled = 1;
  google.protobuf.Value value = 2;  // optional; when set, flag carries a value
}

message SetFeatureFlagRequest {
  string tenant_id = 1;
  string flag_key = 2;
  bool enabled = 3;
  optional google.protobuf.Value value = 4;
}

message SetFeatureFlagResponse {
  bool enabled = 1;
  google.protobuf.Value value = 2;
}
