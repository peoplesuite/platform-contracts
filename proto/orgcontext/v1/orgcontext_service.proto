syntax = "proto3";

package orgcontext.v1;

option go_package = "github.com/peoplesuite/platform-core/api/proto/orgcontext/v1;orgcontextv1";

import "orgcontext/v1/orgcontext.proto";

service OrgContextQueryService {
  rpc GetAssociate(GetAssociateRequest) returns (GetAssociateResponse);
  rpc GetAssociateByUserId(GetAssociateByUserIdRequest) returns (GetAssociateByUserIdResponse);
  rpc ResolveAssociateContext(ResolveAssociateContextRequest) returns (ResolveAssociateContextResponse);

  rpc GetOrgUnit(GetOrgUnitRequest) returns (GetOrgUnitResponse);
  rpc GetOrgUnitTree(GetOrgUnitTreeRequest) returns (GetOrgUnitTreeResponse);
  rpc GetOrgLineage(GetOrgLineageRequest) returns (GetOrgLineageResponse);

  rpc GetDirectReports(GetDirectReportsRequest) returns (GetDirectReportsResponse);
  rpc GetIndirectReports(GetIndirectReportsRequest) returns (GetIndirectReportsResponse);
  rpc GetUnitMembers(GetUnitMembersRequest) returns (GetUnitMembersResponse);
  rpc GetHeadOfUnit(GetHeadOfUnitRequest) returns (GetHeadOfUnitResponse);

  rpc GetAssignments(GetAssignmentsRequest) returns (GetAssignmentsResponse);
  rpc GetEmploymentHistory(GetEmploymentHistoryRequest) returns (GetEmploymentHistoryResponse);

  rpc SearchAssociates(SearchAssociatesRequest) returns (SearchAssociatesResponse);
  rpc SearchOrgUnits(SearchOrgUnitsRequest) returns (SearchOrgUnitsResponse);
  rpc GetUnassignedAssociates(GetUnassignedAssociatesRequest) returns (GetUnassignedAssociatesResponse);
}

service OrgContextCommandService {
  rpc UpsertOrgUnit(UpsertOrgUnitRequest) returns (UpsertOrgUnitResponse);
  rpc UpsertPosition(UpsertPositionRequest) returns (UpsertPositionResponse);
  rpc UpsertAssociate(UpsertAssociateRequest) returns (UpsertAssociateResponse);
  rpc UpsertPositionAssignment(UpsertPositionAssignmentRequest) returns (UpsertPositionAssignmentResponse);
  rpc UpsertEmploymentEpisode(UpsertEmploymentEpisodeRequest) returns (UpsertEmploymentEpisodeResponse);

  rpc SetManagerRelation(SetManagerRelationRequest) returns (SetManagerRelationResponse);
  rpc SetHeadOfUnit(SetHeadOfUnitRequest) returns (SetHeadOfUnitResponse);
  rpc AssignAssociateToPosition(AssignAssociateToPositionRequest) returns (AssignAssociateToPositionResponse);
  rpc UnassignAssociateFromPosition(UnassignAssociateFromPositionRequest) returns (UnassignAssociateFromPositionResponse);

  rpc IngestAssociateBatch(IngestAssociateBatchRequest) returns (IngestAssociateBatchResponse);
  rpc IngestSnapshot(IngestSnapshotRequest) returns (IngestSnapshotResponse);
  rpc ApplyDelta(ApplyDeltaRequest) returns (ApplyDeltaResponse);
  rpc RebuildDerivedRelations(RebuildDerivedRelationsRequest) returns (RebuildDerivedRelationsResponse);
}
