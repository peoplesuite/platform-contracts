syntax = "proto3";

package settings.v1;

option go_package = "peoplesuite/platform-contracts/gen/go/settings/v1;settingsv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// TenantConfig holds tenant-level configuration.
message TenantConfig {
  string tenant_id = 1;
  string display_name = 2;
  string timezone = 3;   // e.g. America/New_York
  string locale = 4;     // e.g. en-US
  string branding_json = 5;  // JSON object for branding (logo URL, colors, etc.)
  google.protobuf.Struct extra = 6;  // extensible key-value config
  google.protobuf.Timestamp updated_at = 7;
}

message GetTenantConfigRequest {
  string tenant_id = 1;
}

message GetTenantConfigResponse {
  TenantConfig config = 1;
}

// Feature flag: enabled bool + optional value (string, number, or struct).
message GetFeatureFlagRequest {
  string tenant_id = 1;
  string flag_key = 2;
}

message GetFeatureFlagResponse {
  bool enabled = 1;
  google.protobuf.Value value = 2;  // optional; when set, flag carries a value
}

// Module registry: list of enabled module identifiers for a tenant.
message ModuleEntry {
  string module_id = 1;
  string name = 2;       // optional display name
  bool enabled = 3;
}

message GetModuleRegistryRequest {
  string tenant_id = 1;
}

message GetModuleRegistryResponse {
  repeated ModuleEntry modules = 1;
}

// Notification template: stored body, optionally rendered with variables.
message GetNotificationTemplateRequest {
  string tenant_id = 1;
  string template_id = 2;
  map<string, string> variables = 3;  // optional; for variable substitution
}

message GetNotificationTemplateResponse {
  string rendered = 1;  // final string (body as-is or with variables applied)
}

// UpdateTenantConfig: partial update; only set fields are updated.
message UpdateTenantConfigRequest {
  string tenant_id = 1;
  optional string display_name = 2;
  optional string timezone = 3;
  optional string locale = 4;
  optional string branding_json = 5;
  optional google.protobuf.Struct extra = 6;
}

message UpdateTenantConfigResponse {
  TenantConfig config = 1;
}

// Micro-app (e.g. Work Hub, Talent Hub, Admin Hub).
message MicroApp {
  string key = 1;
  string name = 2;
  string entry_url = 3;
  string icon_name = 4;
  string kind = 5;
  int32 sort_order = 6;
}

message GetMicroAppsRequest {}

message GetMicroAppsResponse {
  repeated MicroApp apps = 1;
}

// Feature badge (e.g. "new", "soon").
message FeatureBadge {
  string key = 1;
  string label = 2;
  string level = 3;
}

// Feature definition metadata.
message FeatureDefinition {
  string key = 1;
  string title = 2;
  string icon_name = 3;
  string icon_url = 4;
  string entry_url = 5;
  string entry_path = 6;
  string kind = 7;
  repeated FeatureBadge badges = 8;
  string micro_app_key = 9;
  int32 sort_order = 10;
}

message GetFeatureDefinitionsRequest {
  string micro_app_key = 1;  // optional; when set, filter by micro-app
}

message GetFeatureDefinitionsResponse {
  repeated FeatureDefinition features = 1;
}

message GetFeaturesForTenantRequest {
  string tenant_id = 1;
}

message GetFeaturesForTenantResponse {
  repeated FeatureDefinition features = 1;
}

// Navigation: tree of nav items for bootstrap/shell.
message NavIcon {
  string name = 1;
  string url = 2;
}

message NavBadge {
  string key = 1;
  string label = 2;
  string level = 3;
}

message NavItem {
  string key = 1;
  string title = 2;
  NavIcon icon = 3;
  string feature_key = 4;
  string entry_url = 5;
  string entry_path = 6;
  bool admin_only = 7;
  bool manager_only = 8;
  repeated NavBadge badges = 9;
  repeated NavItem children = 10;
}

message GetNavigationRequest {
  string tenant_id = 1;
  string context = 2;  // e.g. "default", "workforce", "admin"
}

message GetNavigationResponse {
  repeated NavItem items = 1;
}

message UpsertNavigationRequest {
  string tenant_id = 1;
  string context = 2;
  repeated NavItem items = 3;
}

message UpsertNavigationResponse {
  repeated NavItem items = 1;
}

// Notice for bootstrap.notices.
message Notice {
  string id = 1;
  string level = 2;
  string title = 3;
  string message = 4;
}

message ListNoticesRequest {
  string tenant_id = 1;
}

message ListNoticesResponse {
  repeated Notice notices = 1;
}

// Shell config (stored in tenant_config.extra).
message GetShellConfigRequest {
  string tenant_id = 1;
}

message GetShellConfigResponse {
  bool admin_available = 1;
}

message UpdateShellConfigRequest {
  string tenant_id = 1;
  bool admin_available = 2;
}

message UpdateShellConfigResponse {
  bool admin_available = 1;
}
