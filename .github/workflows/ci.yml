name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Cache go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Lint proto files
        run: buf lint

      - name: Check for breaking changes
        if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=main'

      - name: Generate code
        run: buf generate

      - name: Verify generated code is up to date
        run: |
          git diff --exit-code gen/ || (
            echo "Generated code is out of date. Run 'buf generate' and commit the changes."
            exit 1
          )

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (
            echo "Go module files are out of date. Run 'go mod tidy' and commit the changes."
            exit 1
          )

      - name: Build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  tag:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    outputs:
      tag_name: ${{ steps.tag_output.outputs.tag_name }}
      pushed: ${{ steps.tag_output.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if HEAD already tagged
        id: skip
        run: |
          if git describe --exact-match --tags HEAD 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.skip.outputs.skip != 'true'
        id: tag_push
        run: |
          set -e
          latest=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$latest" ]; then
            new_tag="v0.1.0"
          else
            ver=${latest#v}
            major=$(echo "$ver" | awk -F '[.]' '{print $1}')
            minor=$(echo "$ver" | awk -F '[.]' '{print $2}')
            patch=$(echo "$ver" | awk -F '[.]' '{print $3}')
            patch=$((patch + 1))
            new_tag="v${major}.${minor}.${patch}"
          fi
          echo "$new_tag" > new_tag.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$new_tag"
          git push origin "$new_tag"

      - name: Set tag job outputs
        id: tag_output
        run: |
          if [ -f new_tag.txt ]; then
            echo "tag_name=$(cat new_tag.txt)" >> "$GITHUB_OUTPUT"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=$(git describe --exact-match --tags HEAD)" >> "$GITHUB_OUTPUT"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    runs-on: ubuntu-latest
    needs: [tag]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.tag.outputs.pushed == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Generate code
        run: buf generate

      - name: Verify generated code
        run: |
          git diff --exit-code gen/ || (
            echo "Generated code is out of date. Ensure gen/ is committed before releasing."
            exit 1
          )

      - name: Build
        run: go build ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
